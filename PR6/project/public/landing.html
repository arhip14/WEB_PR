<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід — АгроЕнерго</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .auth-card { max-width: 400px; width: 100%; padding: 40px; border-radius: 30px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .btn-success { background: #198754; border: none; border-radius: 50px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="card auth-card bg-white">
        <div class="text-center mb-4">
            <span class="fs-1">🌱</span>
            <h2 class="fw-bold mt-2" style="font-family: 'Montserrat';">Вітаємо в <span class="text-success">Agro</span></h2>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" style="border-radius: 15px; padding: 12px;" placeholder="Email" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" style="border-radius: 15px; padding: 12px;" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3 shadow-sm">Увійти</button>
            <a href="/register.html" class="btn btn-outline-secondary w-100" style="border-radius: 50px; padding: 12px;">Створити акаунт</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.fromEntries(formData))
        });

        if (response.ok) {
            window.location.href = '/';
        } else {
            Swal.fire('Помилка', 'Невірний email або пароль', 'error');
        }
    };
</script>
<script src="js/security.js"></script>
</body>
</html>
