<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель — «АгроЕнерго»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --dark: #1a1a1a; --bg: #f8f9fc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #334155; }
        .admin-card { border-radius: 24px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.03); background: white; padding: 25px; }
        .stat-card { border-radius: 20px; border: none; padding: 25px; color: white; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .bg-gradient-blue { background: linear-gradient(135deg, #4361ee 0%, #4895ef 100%); }
        .bg-gradient-green { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); }
        .bg-gradient-dark { background: linear-gradient(135deg, #1a1a1a 0%, #334155 100%); }
        .badge-status { padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 11px; }
        .status-active { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .status-cancelled { background: rgba(148, 163, 184, 0.1); color: #64748b; }
        canvas { max-height: 250px; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom py-3 mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary fs-3" href="/" style="font-family: 'Montserrat';">🌱 АГРОЕНЕРГО</a>
        <button onclick="handleLogout()" class="btn btn-outline-danger rounded-pill fw-bold px-4">ВИХІД</button>
    </div>
</nav>

<div class="container pb-5">
    <h1 class="fw-bold mb-4">📊 NETWORK <span class="text-primary">ANALYTICS</span></h1>

    <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="stat-card bg-gradient-blue">
            <small class="opacity-75">КОРИСТУВАЧІ</small><h2 class="fw-bold m-0" id="total-users">--</h2>
        </div></div>
        <div class="col-md-3"><div class="stat-card bg-gradient-green">
            <small class="opacity-75">ОБОРОТ МЕРЕЖІ</small><h2 class="fw-bold m-0" id="total-money">0 ₴</h2>
        </div></div>
        <div class="col-md-3"><div class="stat-card bg-gradient-dark">
            <small class="opacity-75">АКТИВНІ СЕСІЇ</small><h2 class="fw-bold m-0" id="active-res">--</h2>
        </div></div>
        <div class="col-md-3"><div class="stat-card bg-primary">
            <small class="opacity-75">СЕРВЕР</small><h2 class="fw-bold m-0">ACTIVE</h2>
        </div></div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-8">
            <div class="card admin-card">
                <h6 class="fw-bold mb-3">Моніторинг доходу (₴)</h6>
                <canvas id="incomeChart"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card admin-card">
                <h6 class="fw-bold mb-3">Популярність станцій</h6>
                <canvas id="stationChart"></canvas>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card admin-card">
                <h5 class="fw-bold mb-4">Останні транзакції в мережі</h5>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                        <tr><th>Водій</th><th>Станція</th><th>Сума</th><th>Статус</th><th>Дата</th></tr>
                        </thead>
                        <tbody id="reservations-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let incomeChart, stationChart;

    async function handleLogout() {
        await fetch('/auth/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function initCharts() {
        const ctx1 = document.getElementById('incomeChart').getContext('2d');
        incomeChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'],
                datasets: [{
                    label: 'Дохід за тиждень',
                    data: [1200, 1900, 1500, 2500, 2200, 3000, 2800],
                    borderColor: '#4361ee',
                    backgroundColor: 'rgba(67, 97, 238, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        const ctx2 = document.getElementById('stationChart').getContext('2d');
        stationChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Uman Fast', 'KPI Eco', 'Bio-Hub'],
                datasets: [{
                    data: [55, 25, 20],
                    backgroundColor: ['#4361ee', '#2ecc71', '#1a1a1a']
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    async function loadAdminStats() {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();

        document.getElementById('total-users').innerText = data.totalUsers;
        document.getElementById('total-money').innerText = data.totalMoney + ' ₴';
        document.getElementById('active-res').innerText = data.activeReservations;

        const list = document.getElementById('reservations-list');
        list.innerHTML = data.latestReservations.map(r => `
            <tr>
                <td><div class="fw-bold">${r.userName}</div></td>
                <td>${r.stationName}</td>
                <td><span class="fw-bold text-primary">${r.amount} ₴</span></td>
                <td><span class="badge-status ${r.status === 'active' ? 'status-active' : 'status-cancelled'}">
                    ${r.status === 'active' ? 'АКТИВНО' : 'ЗАКРИТО'}
                </span></td>
                <td><small class="text-muted">${new Date(r.time).toLocaleTimeString()}</small></td>
            </tr>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
        initCharts();
        loadAdminStats();
        setInterval(loadAdminStats, 10000);
    });
</script>
<script src="js/security.js"></script>
</body>
</html>
