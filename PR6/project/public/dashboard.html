<script>
    fetch('/auth/status')
        .then(res => res.json())
        .then(data => {
            if (!data.authenticated) {
                window.location.href = '/login.html';
            } else {
                document.getElementById('userRoleDisplay').innerText = 'Роль: ' + data.user.role;

                if (data.user.role === 'network_admin') {
                    console.log("Доступ до аналітики дозволено");
                }
            }
        });

    function reserveCharger() {
        fetch('/api/charging/reserve', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                Swal.fire('Успіх', data.message || data.error, data.error ? 'error' : 'success');
            });
    }
</script>
<script src="js/security.js"></script>
